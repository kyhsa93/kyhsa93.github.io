<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>kyhsa93.github.io</title>
    <script>
      // Single Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      // GitHub Pages serves this file for any path it doesn't recognize as a real file.
      // Re-encode the real path into a query string, redirect to the root, and index.html's
      // own decode script restores it via history.replaceState before React mounts, so
      // BrowserRouter sees the original path with no visible flash or redirect loop.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
